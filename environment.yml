# Fully tracked environment. The SAME file is used locally and in CI (micromamba),
# so behaviour is identical. `pip: [.]` installs the crate-kit package, which pulls
# rocrate / pyyaml / pathspec from pyproject.toml. quarto comes from conda-forge.
#
#   conda env create -f environment.yml      # creates env "crate-kit"
#   conda activate crate-kit
#   crate build . && crate validate . && crate render . -o _site
name: crate-kit
channels: [conda-forge]
dependencies:
  - python=3.11
  - quarto=1.9.38          # pinned: an unpinned solve produced a broken extraction on arm64
  - pip
  - pip:
      - .
