# ─────────────────────────────────────────────────────────────────────────────
# M@TE PROFILE — the single contract for a model's metadata.
#
# ONE definition, FOUR consumers:
#   • the issue form          (field labels, input types, options)       → authoring
#   • the issue→crate mapping (each field's schema.org `property`)        → build/merge
#   • `mate validate`         (`required` + `requires_for_website`)       → the gate
#   • a Crate-O "mode file"   (types + properties)                       → rich editor (later)
#
# It is editor-agnostic and domain-specific: this is the geoscience pack (a folder for now,
# its own repo later). A different discipline swaps this file, not the engine.
# ─────────────────────────────────────────────────────────────────────────────
profile: mate-geoscience
version: 0

# Imported vocabularies (loaded by crate_kit/vocab.py): their terms become `additionalType` roles
# offered/validated by the role verb, the issue form, and validate. See mate-vocabularies.
imports:
  - communication

# Re-skin imported generic vocab terms with geoscience wording. Term IDENTITY stays generic
# (crates store `setup-diagram`); only the human-facing label/definition shown by forms,
# readiness reports, and the role dropdown change. (TARGET_ARCHITECTURE de-leak, option (a).)
vocab_overrides:
  setup-diagram:
    label: "Model setup diagram"
    definition: "A figure depicting the model's geometry, domain, mesh, or boundary/initial conditions."
  process-animation:
    label: "Simulation animation"
    definition: "A time-evolving movie of the model's state or output — the simulation rendered over time."

# Internal enrich (gap-fill, best-effort): derive metadata from repo content. `license` reads a
# LICENSE/COPYING file → SPDX on the root — directly helps clear the open-license floor.
internal_enrich:
  - license

# Authoritative, PINNED contexts. Vendored — never fetched live at build time (v1's mistake).
context:
  - https://w3id.org/ro/crate/1.1/context
  - https://schema.org/

# ── Root entity ──────────────────────────────────────────────────────────────
# RO-Crate requires the crate's root to be a schema.org Dataset. Each field carries
# everything its four consumers need: the schema.org `property`, whether it's `required`,
# the `input` hint for the form, and (for PIDs) which `enrich` resolver applies.
root:
  type: Dataset
  fields:
    title:
      property: name
      required: true
      input: text
      label: "Model title"
    description:
      property: description
      required: true
      input: textarea
      label: "Short description (plain language, < 100 words)"
    abstract:
      property: abstract
      required: false
      input: textarea
      label: "Scientific abstract"
    license:
      property: license
      required: true
      input: dropdown
      label: "License"
      options: [CC-BY-4.0, AGPL-3.0, GPL-3.0, LGPL-3.0, MPL-2.0, Apache-2.0, MIT, "(other URL)"]
    creators:
      property: creator
      required: true
      input: people          # one per line: an ORCID iD, or "Family, Given"
      many: true
      label: "Model creator(s) — ORCID iD or 'Family, Given', one per line"
      enrich: author
    keywords:
      property: keywords
      required: false
      input: list
      many: true
      label: "Scientific keywords (comma-separated)"
    publication_doi:
      property: citation
      required: false
      input: text
      label: "Associated publication DOI"
      enrich: publication

# ── Conventional subdirectories: typed for free (tier-2) ─────────────────────
# A directory with one of these names gets these schema.org types/roles automatically;
# its human description (the value-add) is supplied separately via `mate describe`.
datasets:
  model_code_inputs:
    type: [Dataset, SoftwareSourceCode]
    role: inputs
    label: "Model code & inputs"
  model_output_data:
    type: [Dataset]
    role: outputs
    label: "Model output data"
  figures:
    type: [Dataset]
    itemType: ImageObject
    role: figures
    label: "Figures"

# Website-asset whitelist for the "Tag website content" form — the image/animation file types
# destined for a model's page. MATE's own list (tune here without touching the engine): common
# raster + vector stills, plus the web-playable movie formats for simulation animations.
website_asset_types: [.png, .jpg, .jpeg, .webp, .gif, .svg, .tif, .tiff, .mp4, .webm, .mov, .ogv]

# ── External data payload (link-payload) ─────────────────────────────────────
payload:
  backends: [zenodo, nci, url]
  default_backs: model_output_data/

# ── Contextual entities ("remote" things added BY REFERENCE) — drives `crate add` + form 3 ──
# Without this block `crate add` has no kinds. remote_data is what satisfies the open-PID floor
# (open_pid_hosts), so the geoscience floor depends on this being here.
contextual:
  creator:
    label: "Creator / author (a person)"
    type: Person
    link: creator
    id_hint: "ORCID iD, e.g. 0000-0002-1825-0097"
    enrich: author
  publication:
    label: "Publication (article / preprint)"
    type: ScholarlyArticle
    link: citation
    id_hint: "DOI, e.g. 10.1038/s41586-020-2649-2"
    enrich: publication
  software:
    label: "Software used"
    type: SoftwareApplication
    link: mentions
    id_hint: "DOI or homepage URL"
    enrich: software
  funder:
    label: "Funder / organisation"
    type: Organization
    link: funder
    id_hint: "ROR id or URL"
    enrich: organization
  remote_data:
    label: "Remote data payload (large outputs hosted on NCI / Zenodo)"
    type: Dataset
    link: distribution
    id_hint: "a DOI / Zenodo record / NCI URL (must be an open, resolvable PID)"
    enrich: null

# ── Enrichment keep-lists ────────────────────────────────────────────────────
# What to RETAIN from each resolved PID. Best-effort, never fatal. Answers
# "how much of the API blob do I keep?" as config, not 800 lines of code.
enrich:
  publication:  { keep: [name, author, datePublished, url] }     # Crossref → ScholarlyArticle
  author:       { keep: [givenName, familyName, "@id", affiliation] }  # ORCID → Person
  organization: { keep: [name, "@id"] }                          # ROR → Organization

# ── The admission gate (consumed by `mate validate`, NOT by render) ──────────
# Render is permissive; the website bar is the validator. A model is catalogue-eligible
# only if its crate satisfies these. (Legacy flat list — superseded by `readiness:` below.)
requires_for_website:
  - name
  - license
  - creator
  - any: ["model_code_inputs/", external_payload]   # must have code OR a declared payload

# ── Catalogue readiness — tiered traffic-light (crate readiness; consumed by validate) ───
# Floor = title + creators + OPEN license + ≥1 image of any kind + CODE-OR-(open)-DATA (the v1
# either/or: at minimum one of model code / an openly-archived data payload, ideally both).
# The principle: the platform grants visibility, which must be EARNED by an open contribution —
# an image + a publication is presence without substance. See memory/minimum-asset-floor.md.

# Open-license allowlist (the floor requires one of these; `(other URL)` does NOT qualify — that's
# the loophole closed). SPDX ids.
open_licenses: [CC-BY-4.0, CC-BY-SA-4.0, CC0-1.0, AGPL-3.0, GPL-3.0, LGPL-3.0, MPL-2.0, Apache-2.0, MIT]

# Hosts accepted as a "resolvable open PID" for a remote data payload — a declared payload must
# point at one of these (a DOI / Zenodo / NCI), not just any URL. (We check presence of an open
# pointer; we deliberately do NOT police substance beyond this — registry review handles the rest.)
open_pid_hosts: [doi.org, zenodo.org, nci.org.au]

readiness:
  title: "Model readiness"          # report/status-issue heading (engine default: "Readiness")
  required:
    - { property: name,    label: "A model title" }
    - { open_license: true, label: "An open license (CC-BY, CC0, MIT, GPL, Apache, …)" }
    - { property: creator, label: "At least one creator" }
    - { type: ImageObject, label: "At least one image (any figure or screenshot)", action_role: figure }
    - { any: ["model_code_inputs/", {open_payload: true}], label: "Model code OR an openly-archived data payload (DOI/Zenodo/NCI)" }
  encouraged:
    - { role: graphical-abstract, label: "A graphical abstract (the ideal hero image)", action_role: graphical-abstract }
    - { property: description,    label: "A plain-language description" }
    - { role: setup-diagram, label: "A model-setup diagram", action_role: setup-diagram }

# ── Optional describe-entities (extensible add-ons; not required) ────────────
# Declared here so the form/CLI can offer them; each maps to a contextual entity.
optional_entities:
  software:                                          # → SoftwareApplication
    fields:
      name:        { property: name }
      doi:         { property: identifier, enrich: software }
      repository:  { property: codeRepository }
  compute:                                           # → Service
    fields:
      uri:         { property: url }

# ── Tag sets (controlled vocab → website categories; TARGET_ARCHITECTURE §23) ─────────────────
# Each set is a controlled vocabulary applied to an entity. Stored as schema.org DefinedTerm refs
# (with inDefinedTermSet naming the set) on the target's `about`/`keywords`, selectable via a form
# dropdown, grouped by the resolver into website categories. `terms` are inline for now (a minted
# MATE-v2 DefinedTermSet later). Free-text scientific keywords stay on root.keywords (the Configure
# form's keyword field) — controlled tags live in `about` to avoid clobbering it.
tag_sets:
  model_category:
    label: "Model category"
    target: root
    property: about
    website: model_category
    multiple: true
    terms:
      - { id: published-in-study,    name: "Model published in study" }
      - { id: community-benchmark,   name: "Community benchmark" }
      - { id: attempted-reproduction, name: "Attempted reproduction" }
      - { id: educational,           name: "Educational" }
      - { id: forward-model,         name: "Forward model" }
      - { id: inverse-model,         name: "Inverse model" }
      - { id: other,                 name: "Other" }

# ── Component types: the curated drop-down for `describe` ─────────────────────
# ~5 useful types covering the 90%, each with a curated set of schema.org / CodeMeta
# fields + prompts. Anything not here is still reachable via the escape hatch
# (`mate describe ... --type <anySchemaType> --set <anyProperty>=<value>`) — full
# flexibility, so nothing is boxed in. Terms resolve to schema.org / CodeMeta.
component_types:
  Dataset:
    label: "Dataset — data / model inputs or outputs"
    fields:
      encodingFormat:      { label: "File format(s)", input: list, help: "e.g. application/x-hdf5, image/tiff" }
      variableMeasured:    { label: "Variables", input: list, help: "e.g. temperature, velocity, viscosity" }
      measurementTechnique: { label: "How it was produced", input: text }
      contentSize:         { label: "Total size", input: text, help: "e.g. 40 GB" }
  SoftwareSourceCode:
    label: "Software source code — model code / scripts"
    fields:
      programmingLanguage: { label: "Language(s)", input: list }
      runtimePlatform:     { label: "Runtime platform", input: text, help: "e.g. Python 3.11, MPI" }
      softwareRequirements: { label: "Requirements / dependencies", input: text }
      buildInstructions:   { label: "Build instructions", input: text, help: "text, or reference a script e.g. build.sh", vocab: codemeta }
      codeRepository:      { label: "Source repository", input: text }
  SoftwareApplication:
    label: "Software application / framework — e.g. Underworld, ASPECT"
    fields:
      softwareVersion:     { label: "Version", input: text }
      operatingSystem:     { label: "Operating system", input: text }
      applicationCategory: { label: "Category", input: text }
      url:                 { label: "Homepage / DOI", input: text }
  ComputationalWorkflow:
    label: "Computational workflow — a pipeline of steps"
    fields:
      programmingLanguage: { label: "Workflow language", input: text }
      input:               { label: "Inputs", input: list }
      output:              { label: "Outputs", input: list }
  ImageObject:
    label: "Image / figure"
    fields:
      caption:             { label: "Caption", input: text }
      encodingFormat:      { label: "Format", input: text }
      contentUrl:          { label: "URL (if hosted)", input: text }
