# Reusable workflow. Model repos call it:
#   jobs: { crate: { uses: ModelAtlasofTheEarth/crate-kit/.github/workflows/build.yml@v0 } }
# Runs against the CALLER's checkout. The toolkit is installed by the caller's environment.yml
# (single pinned-version source), so local and CI behave identically.
#
# If `issue_body` is passed (from an `on: issues` caller), it first writes those answers into
# the crate via `crate from-issue`; then build/validate/render run as usual.
name: build-crate

on:
  workflow_call:
    inputs:
      render:
        type: boolean
        default: true
      issue_body:
        type: string
        required: false
        default: ""
      issue_number:
        type: string
        required: false
        default: ""
      issue_title:
        type: string
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    # Permissions are set by the CALLER (a reusable workflow can't request more than the caller
    # grants, or the run fails to start). Push callers grant `contents: write`; the on-issue
    # caller also grants `issues: write` for the comment step.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history -> git provenance

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true

      - name: apply issue submission (if any)
        if: ${{ inputs.issue_body != '' }}
        shell: bash -el {0}
        env:
          ISSUE_BODY: ${{ inputs.issue_body }}    # via env, not interpolated into the script
        run: |
          printf '%s' "$ISSUE_BODY" > /tmp/issue.md
          # One generic edit-entity form (target defaults to root). --print-command writes the
          # equivalent `crate` command to stdout; capture it for the confirmation comment.
          crate from-issue . --body /tmp/issue.md --print-command > /tmp/crate_command.txt || true

      - name: build + validate
        shell: bash -el {0}
        run: |
          crate build .
          crate validate .

      - name: enrich PIDs (best-effort; never fails the build)
        shell: bash -el {0}
        run: crate enrich . || echo "enrich skipped"

      - name: render
        if: ${{ inputs.render }}
        shell: bash -el {0}
        run: crate render . -o _site

      - name: refresh data-entity issue form (live folder dropdown)
        # Only for repos that opt in by shipping the form. First-level, non-hidden directories
        # become the path-dropdown options (clamped to depth 1 by design), so the picker tracks
        # the repo. The Configure (root) form is static — it has no path. Git-diff means this only
        # re-commits when the folder set actually changes.
        if: ${{ hashFiles('.github/ISSUE_TEMPLATE/edit-data-entity.yml') != '' }}
        shell: bash -el {0}
        run: |
          args=()
          while IFS= read -r d; do [ -n "$d" ] && args+=(--dir "$d/"); done < <(
            find . -mindepth 1 -maxdepth 1 -type d -not -name '.*' | sed 's|^\./||' | sort)
          crate issue-form --repo . --kind data --out .github/ISSUE_TEMPLATE/edit-data-entity.yml --title "[edit] " "${args[@]}"

      - name: commit regenerated crate (+ refreshed form)
        shell: bash -el {0}
        run: |
          git config user.name  "crate-bot"
          git config user.email "crate-bot@users.noreply.github.com"
          git add ro-crate-metadata.json
          git add .github/ISSUE_TEMPLATE/edit-data-entity.yml 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "Update crate + issue form [skip ci]"
            git push
          fi

      - name: comment on the submission issue
        if: ${{ inputs.issue_number != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CMD=$(cat /tmp/crate_command.txt 2>/dev/null || true)
          {
            echo "✅ Applied to \`ro-crate-metadata.json\` — the single source of truth. Edit the crate (CLI / Crate-O), not this issue."
            if [ -n "$CMD" ]; then
              printf '\nThe command-line equivalent (run it locally next time to skip the round-trip):\n\n'
              printf '```\n%s\n```\n' "$CMD"
              echo "For type-specific fields, open the crate in Crate-O."
            fi
          } > /tmp/comment.md
          gh issue comment "${{ inputs.issue_number }}" --body-file /tmp/comment.md

      - name: upload site artifact
        if: ${{ inputs.render }}
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site
