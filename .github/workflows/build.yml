# Reusable workflow. Model repos call it:
#   jobs: { crate: { uses: ModelAtlasofTheEarth/crate-kit/.github/workflows/build.yml@v0 } }
# Runs against the CALLER's checkout. The environment comes from the caller's pixi.toml +
# pixi.lock (single tracked manifest, same locally and in CI), so behaviour is identical.
#
# If `issue_body` is passed (from an `on: issues` caller), it first writes those answers into
# the crate via `crate from-issue`; then build/validate/render run as usual.
name: build-crate

on:
  workflow_call:
    inputs:
      render:
        type: boolean
        default: true
      issue_body:
        type: string
        required: false
        default: ""
      issue_number:
        type: string
        required: false
        default: ""
      issue_title:
        type: string
        required: false
        default: ""
      status_issue_title:
        # title of the readiness status issue (a GitHub-surface knob — the caller brands it,
        # e.g. "📋 Model readiness" for MATE; the report BODY heading comes from the profile)
        type: string
        required: false
        default: "📋 Readiness"

jobs:
  build:
    runs-on: ubuntu-latest
    # Serialize builds per repo: rapid-fire pushes otherwise interleave and the LAST step's
    # `git push` loses the race (observed: 3 pushes in 60s → one build's bot commit rejected).
    # No cancel — every push still gets its build, they just queue.
    concurrency:
      group: crate-build-${{ github.repository }}
      cancel-in-progress: false
    # Permissions are set by the CALLER (a reusable workflow can't request more than the caller
    # grants, or the run fails to start). Push callers grant `contents: write`; the on-issue
    # caller also grants `issues: write` for the comment step.
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0        # full history -> git provenance

      - name: ensure issue-form labels exist
        # GitHub issue forms can only APPLY a label that already exists; a fresh template repo has
        # only the default labels, so `crate-edit` is silently dropped and the on-issue gate misses.
        # Create it (idempotent) on every build so the label-gate matches even if a user edits the
        # issue title. Needs issues:write (granted by the caller).
        if: ${{ !endsWith(github.repository, '-template') }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create crate-edit --repo "${{ github.repository }}" \
            --color BFD4F2 --description "crate edit (issue forms)" --force || true

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: true                  # keyed on pixi.lock — exact, no stale-env guesswork
          activate-environment: true   # env on PATH for every later step (no login-shell tricks)

      - name: ride the moving @v0 (ACTIVE repos track the engine tip; published repos freeze)
        # pixi.lock pins the exact crate-kit commit the v0 tag pointed at when the repo locked —
        # the RIGHT model for a published/archived model (immutable snapshot). While a repo is in
        # active development we want engine fixes without relocking, so re-install from the
        # CURRENT v0 each run. Freezing a repo = deleting this step. Skips -template repos (inert).
        if: ${{ !endsWith(github.repository, '-template') }}
        run: |
          pip install --force-reinstall --no-deps --no-cache-dir \
            "crate-kit @ git+https://github.com/ModelAtlasofTheEarth/crate-kit.git@v0"
          crate --version 2>/dev/null || echo "crate installed"

      - name: stage issue submission (if any)
        if: ${{ inputs.issue_body != '' }}
        env:
          ISSUE_BODY: ${{ inputs.issue_body }}    # via env, not interpolated into the script
        run: printf '%s' "$ISSUE_BODY" > /tmp/issue.md

      - name: sync (apply issue → build → validate → enrich → refresh forms)
        # THE derive pipeline is ONE engine verb (`crate sync`, tested in crate-kit) — the same
        # call the push-retry below re-runs, so the two can't drift. --issue-body is passed
        # unconditionally (the engine skips an absent/empty file). An apply failure does NOT
        # fail this step: it's recorded in sync_result.json and the comment step reports it.
        run: |
          crate sync . --issue-body /tmp/issue.md --forms-out .github/ISSUE_TEMPLATE \
            --result-out /tmp/sync_result.json

      - name: readiness → job summary (the catalogue traffic-light)
        if: ${{ !endsWith(github.repository, '-template') }}
        continue-on-error: true
        run: |
          crate readiness . --repo-url "${{ github.server_url }}/${{ github.repository }}" --markdown \
            >> "$GITHUB_STEP_SUMMARY" || true

      - name: maintain the readiness status issue (best-effort; needs issues:write)
        if: ${{ !endsWith(github.repository, '-template') }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          TITLE: ${{ inputs.status_issue_title }}
        run: |
          crate readiness . --repo-url "$REPO_URL" --markdown > /tmp/readiness.md || exit 0
          NUM=$(gh issue list --state open --search "in:title $TITLE" --json number,title \
                --jq ".[] | select(.title==\"$TITLE\") | .number" 2>/dev/null | head -1 || true)
          if [ -n "$NUM" ]; then
            gh issue edit "$NUM" --body-file /tmp/readiness.md
          else
            gh issue create --title "$TITLE" --body-file /tmp/readiness.md --label crate-status 2>/dev/null \
              || gh issue create --title "$TITLE" --body-file /tmp/readiness.md
          fi

      - name: render
        if: ${{ inputs.render }}
        run: crate render . -o _site

      - name: commit regenerated crate (+ refreshed form)
        run: |
          git config user.name  "crate-bot"
          git config user.email "crate-bot@users.noreply.github.com"
          BR="${GITHUB_REF_NAME:-main}"
          stage() {
            git add ro-crate-metadata.json
            git add ro-crate-preview.html 2>/dev/null || true    # human-readable crate preview
            git add .github/ISSUE_TEMPLATE 2>/dev/null || true   # incl. dynamically-named typed forms
          }
          # main can move mid-build: this run checked out github.sha, but a queued earlier build's
          # bot commit (or a user push) landed meanwhile. NEVER rebase the derived artifact — two
          # whole-file crate rewrites always conflict. Instead adopt the moved main wholesale
          # (keeping ITS authored data, e.g. a concurrent issue apply), then RE-DERIVE on top —
          # the SAME `crate sync` the main path ran (issue re-applied via --issue-body; skipped
          # when /tmp/issue.md is absent/empty). derive+merge is idempotent, so the retry commit
          # is correct by construction.
          # (flag + break, not `exit` — survives any shell's exit-vs-login quirks)
          done_ok=""
          stage
          if git diff --cached --quiet; then
            echo "nothing to commit"
            done_ok=1
          else
            git commit -m "Update crate + issue form [skip ci]"
            for attempt in 1 2 3; do
              if git push; then done_ok=1; break; fi
              echo "push rejected (attempt $attempt) — re-deriving on the moved $BR"
              git fetch origin "$BR"
              git reset --hard "origin/$BR"
              crate sync . --issue-body /tmp/issue.md --forms-out .github/ISSUE_TEMPLATE || true
              stage
              if git diff --cached --quiet; then
                echo "moved $BR already carries this state"
                done_ok=1
                break
              fi
              git commit -m "Update crate + issue form [skip ci]"
            done
          fi
          [ -n "$done_ok" ] || git push   # out of retries — fail loudly

      - name: comment on the submission issue
        # ALWAYS comment when an issue triggered this — success OR failure. Never let a submission
        # vanish silently (the v1 failure mode): if the apply failed, say why and how to retry.
        if: ${{ inputs.issue_number != '' && inputs.issue_body != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # everything the comment needs is in sync_result.json's `apply` block
          q() { python3 -c "import json;print((json.load(open('/tmp/sync_result.json')).get('apply') or {}).get('$1') or '')" 2>/dev/null || true; }
          if [ -n "$(q error)" ]; then
            ERR=$(q error)
            {
              echo "⚠️ **Nothing was written to the crate** — I couldn't apply this submission."
              echo ""
              echo "**Reason:** $ERR"
              echo ""
              echo "Edit this issue to fix it and it'll retry automatically, or ask for help."
            } > /tmp/comment.md
          else
            CMD=$(q command)
            # R4 (form grammar): the two-step is never silent — if this edit set a type whose
            # typed form exists after this build's refresh, the engine names it (next_form).
            NEXT=$(q next_form)
            {
              echo "✅ Applied to \`ro-crate-metadata.json\` — the single source of truth. Edit the crate (CLI / Crate-O), not this issue."
              if [ -n "$NEXT" ]; then
                echo ""
                echo "⏭ **Next step (optional):** type-specific fields are on the **${NEXT}** form, available in the [issue chooser](${{ github.server_url }}/${{ github.repository }}/issues/new/choose) once this build finishes refreshing the forms."
              fi
              if [ -n "$CMD" ]; then
                printf '\nThe command-line equivalent (run it locally next time to skip the round-trip):\n\n'
                printf '```\n%s\n```\n' "$CMD"
                echo "For type-specific fields, open the crate in Crate-O."
              fi
            } > /tmp/comment.md
          fi
          gh issue comment "${{ inputs.issue_number }}" --body-file /tmp/comment.md

      - name: upload site artifact
        if: ${{ inputs.render }}
        uses: actions/upload-artifact@v6
        with:
          name: site
          path: _site
